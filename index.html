<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Huaaaaaaaa♡</title>

<style>
body{
    margin:0;
    overflow:auto;
    font-family:'Segoe UI',cursive;
    background:radial-gradient(circle,#1a1a1a,#000);
    color:#eee;
}

/* ENVELOPE */
.envelope{
    position:absolute;
    width:300px;
    height:200px;
    background:#111;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    box-shadow:0 0 30px rgba(0,0,0,0.8);
}
.envelope:before{
    content:"💔 klik perlahan...";
    color:#aaa;
}

/* OPEN */
.open{
    animation:openEnv 1.5s forwards;
}
@keyframes openEnv{
    to{transform:translate(-50%,-250%) scale(0);opacity:0;}
}

/* CONTENT */
.container{
    opacity:0;
    transition:2s;
    text-align:center;
    padding:20px;
}
.show{opacity:1;}

h1{
    font-weight:300;
    letter-spacing:2px;
    animation:fadeText 3s infinite;
}
@keyframes fadeText{
    0%{opacity:.6;}
    50%{opacity:1;}
    100%{opacity:.6;}
}

/* FOTO HATI */
.photo-single{
    display:flex;
    justify-content:center;
    margin:25px;
}
.photo-single img{
    width:200px;
    height:180px;
    object-fit:cover;
    clip-path:path("M100 180 C 20 120, 0 60, 50 30 C 80 10, 100 40, 100 40 C 100 40, 120 10, 150 30 C 200 60, 180 120, 100 180 Z");
    
    filter:grayscale(100%);
    animation:float 5s infinite ease-in-out, heartbeat 10s infinite;
    transition:5s;
}

/* berubah warna */
.color{
    filter:grayscale(0%);
}

/* FLOAT */
@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0);}
}

/* HEARTBEAT */
@keyframes heartbeat{
    0%{transform:scale(1);}
    25%{transform:scale(1.05);}
    40%{transform:scale(0.95);}
    60%{transform:scale(1.1);}
    100%{transform:scale(1);}
}

/* TEXT */
p{
    font-size:18px;
    line-height:1.9;
    white-space:pre-line;
}

/* HUJAN */
.rain{
    position:absolute;
    width:2px;
    height:80px;
    background:rgba(255,255,255,0.15);
    animation:rainFall linear infinite;
}
@keyframes rainFall{
    to{transform:translateY(110vh);}
}

/* PETAL */
.petal{
    position:absolute;
    color:#ff6b81;
    animation:fall linear infinite;
}
@keyframes fall{
    0%{transform:translateY(-10vh);}
    100%{transform:translateY(110vh);}
}

/* BUTTON */
.music-btn{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#ff4e8a;
    border:none;
    padding:10px 15px;
    border-radius:20px;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<audio id="bgm" loop>
<source src="https://cdn.pixabay.com/download/audio/2021/11/25/audio_91b6b7f6e3.mp3">
</audio>

<button class="music-btn" onclick="playMusic()">🎶</button>

<div class="envelope" onclick="openLetter()"></div>

<div class="container" id="content">

<div class="photo-single">
    <img id="photo" src="foto1.jpg">

</div>

<script>

// TYPING
let i=0;
function typing(){

// HUJAN
setInterval(()=>{
    let r=document.createElement("div");
    r.className="rain";
    r.style.left=Math.random()*100+"vw";
    r.style.animationDuration=(0.5+Math.random()*0.5)+"s";
    document.body.appendChild(r);
    setTimeout(()=>r.remove(),1000);
},60);

// KELopak bunga
setInterval(()=>{
    let p=document.createElement("div");

</script>

</body>
</html>
